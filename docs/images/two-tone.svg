<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="#1a1a1a">
  <!-- Two Tone man silhouette (ska figure) -->
  <circle cx="40" cy="15" r="8"/>
  <!-- Hat brim -->
  <rect x="28" y="8" width="24" height="3" rx="1"/>
  <rect x="32" y="3" width="16" height="7" rx="2"/>
  <!-- Body -->
  <rect x="36" y="23" width="8" height="30" rx="2"/>
  <!-- Arms -->
  <line x1="36" y1="30" x2="22" y2="45" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="30" x2="58" y2="42" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="38" y1="53" x2="30" y2="80" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="42" y1="53" x2="52" y2="80" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="28" cy="83" rx="6" ry="3"/>
  <ellipse cx="54" cy="83" rx="6" ry="3"/>
  <rect x="5" y="90" width="70" height="5" rx="1"/>
</svg>
