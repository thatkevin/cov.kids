default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      recurring_tasks:
        email_import:
          class: EmailImportJob
          schedule: "0 1 * * *"   # 1am — check inbox for new event emails
        reddit_import:
          class: RedditImportJob
          schedule: "0 2 * * *"   # 2am — pull Reddit event threads
        feed_sync:
          class: FeedSyncJob
          schedule: "0 3 * * *"   # 3am — run all active feeds (iCal, web, Eventbrite)
        site_publish:
          class: SitePublishJob
          schedule: "0 22 * * 0"  # 10pm Sunday — generate + commit + push GitHub Pages
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
